name: Bug report
description: Something doesn't work as expected
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: Describe the bug. What did you do, what did you expect, what actually happened?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: |
        Minimal steps to reproduce. Include the exact `graphatlas` command,
        the repo / fixture, and the language(s) involved.
      placeholder: |
        1. cd path/to/repo
        2. graphatlas index .
        3. graphatlas query impact src/foo.rs --symbol bar
        4. observed: empty result; expected: 3 callers
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `graphatlas --version`
      placeholder: "graphatlas 0.1.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - macOS (arm64)
        - macOS (x86_64)
        - Linux (x86_64)
        - Linux (arm64)
        - Other (describe in "What happened")
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Relevant log lines, error messages, or stack traces.
      render: shell
