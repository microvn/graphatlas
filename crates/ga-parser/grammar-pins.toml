# Grammar pins for GraphAtlas v1.2 (Lang-C9)
#
# Second-layer pin alongside Cargo.lock blake3. Each entry binds a tree-sitter
# grammar crate to its upstream git commit SHA at the release tag matching the
# resolved Cargo.lock version. Detects upstream tag force-push or republish.
#
# Schema (enforced by crates/ga-parser/tests/grammar_pins_schema.rs):
#   upstream      = "org/repo" (GitHub or other VCS path)
#   commit        = 40-char lowercase hex SHA at the release tag
#   crate         = crates.io crate name
#   crate_version = semver matching Cargo.lock (verified by grammar_pins_cargo_lock.rs)
#
# Coverage invariant (enforced by grammar_pins_coverage.rs):
#   Every `pub mod <lang>;` in src/langs/mod.rs (excluding `shared`) MUST have a
#   matching [pins.<key>] entry. Mod-name → pin-key shorthand:
#     py → python, ts → typescript, js → javascript, rs → rust, kotlin → kotlin-ng
#
# Archive monitoring: see graphatlas-v1.2-grammar-pins.md S-002 (daily
# .github/workflows/grammar-archive-watch.yml + docs/guide/grammar-archival-recovery.md).
#
# Reverification trigger: any time the upstream crate version bumps in Cargo.toml.
# Procedure: fetch the new release tag's commit SHA from the upstream repo
# (gh api repos/<upstream>/git/ref/tags/v<version>), update both crate_version and
# commit fields here, run `cargo test -p ga-parser --test grammar_pins_*`.

[pins.python]
upstream      = "tree-sitter/tree-sitter-python"
commit        = "bffb65a8cfe4e46290331dfef0dbf0ef3679de11"
crate         = "tree-sitter-python"
crate_version = "0.23.6"

